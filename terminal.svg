<svg xmlns="http://www.w3.org/2000/svg" width="800" height="620" viewBox="0 0 800 620">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .bg { fill: #0d1117; }
      .bar { fill: #161b22; }
      .border { fill: none; stroke: #1e2a3a; stroke-width: 1; }
      text { font-family: 'JetBrains Mono', 'Cascadia Code', 'SF Mono', 'Consolas', monospace; }
      .title { fill: #484f58; font-size: 11px; }
      .key { fill: #7ee787; font-size: 13px; }
      .val { fill: #e6edf3; font-size: 13px; }
      .val-bold { fill: #e6edf3; font-size: 15px; font-weight: 700; }
      .link { fill: #58a6ff; font-size: 13px; }
      .header { fill: #f0883e; font-size: 13px; font-weight: 700; }
      .dim { fill: #484f58; font-size: 13px; }
      .type { fill: #d2a8ff; font-size: 13px; }
      .ok { fill: #7ee787; font-size: 13px; }
      .star { fill: #e3b341; font-size: 13px; }
      .prompt-arrow { fill: #7ee787; font-size: 13px; }
      .prompt-path { fill: #58a6ff; font-size: 13px; }
      .prompt-cmd { fill: #e6edf3; font-size: 13px; }
      .divider { stroke: #21262d; stroke-width: 1; }
      .cursor { fill: #58a6ff; }
      @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
      .cursor { animation: blink 1.2s step-end infinite; }
    </style>
  </defs>

  <!-- Terminal window -->
  <rect class="bg" x="0" y="0" width="800" height="620" rx="10"/>
  <rect class="border" x="0" y="0" width="800" height="620" rx="10"/>

  <!-- Title bar -->
  <rect class="bar" x="1" y="1" width="798" height="36" rx="10"/>
  <rect class="bar" x="1" y="27" width="798" height="10"/>
  <line class="divider" x1="1" y1="37" x2="799" y2="37"/>
  <circle fill="#ff5f57" cx="20" cy="19" r="6"/>
  <circle fill="#febc2e" cx="40" cy="19" r="6"/>
  <circle fill="#28c840" cx="60" cy="19" r="6"/>
  <text class="title" x="400" y="23" text-anchor="middle">rakshith@k8s-storage ~ kubectl</text>

  <!-- Prompt 1 -->
  <text class="prompt-arrow" x="24" y="65">❯</text>
  <text class="prompt-path" x="40" y="65">~/ceph</text>
  <text class="prompt-cmd" x="100" y="65">kubectl describe developer rakshith-r</text>

  <!-- kubectl describe output -->
  <text class="key" x="24" y="95">Name:</text>
  <text class="val-bold" x="145" y="95">Rakshith R</text>

  <text class="key" x="24" y="115">Namespace:</text>
  <text class="val" x="145" y="115">IBM / OpenShift Data Foundation</text>

  <text class="key" x="24" y="135">Location:</text>
  <text class="val" x="145" y="135">Bengaluru, India</text>

  <text class="key" x="24" y="155">Status:</text>
  <text class="ok" x="145" y="155">● Active</text>

  <text class="key" x="24" y="175">Role:</text>
  <text class="type" x="145" y="175">Software Engineer</text>

  <!-- Maintainer -->
  <text class="header" x="24" y="205">Maintainer:</text>
  <text class="dim" x="40" y="225">ORGANIZATION</text>
  <text class="dim" x="250" y="225">REPOSITORY</text>

  <text class="val" x="40" y="245">ceph/</text>
  <text class="link" x="250" y="245">ceph-csi</text>

  <text class="val" x="40" y="265">csi-addons/</text>
  <text class="link" x="250" y="265">kubernetes-csi-addons</text>

  <text class="val" x="40" y="285">kubernetes-csi/</text>
  <text class="link" x="250" y="285">external-snapshot-metadata</text>

  <!-- Spec -->
  <text class="header" x="24" y="315">Spec:</text>
  <text class="key" x="40" y="335">Languages:</text>

  <!-- Language bar -->
  <rect fill="#00ADD8" x="40" y="345" width="200" height="6" rx="3"/>
  <rect fill="#326CE5" x="240" y="345" width="60" height="6" rx="0"/>
  <rect fill="#EF5C55" x="300" y="345" width="30" height="6" rx="3"/>

  <rect fill="#00ADD8" x="40" y="360" width="10" height="10" rx="2"/>
  <text class="val" x="56" y="370" font-size="12">Go</text>
  <rect fill="#326CE5" x="110" y="360" width="10" height="10" rx="2"/>
  <text class="val" x="126" y="370" font-size="12">Kubernetes</text>
  <rect fill="#EF5C55" x="230" y="360" width="10" height="10" rx="2"/>
  <text class="val" x="246" y="370" font-size="12">C/C++</text>

  <text class="key" x="40" y="400">Domains:</text>
  <text class="dim" x="56" y="420">-</text><text class="val" x="70" y="420">Container Storage Interface (CSI)</text>
  <text class="dim" x="56" y="440">-</text><text class="val" x="70" y="440">Ceph Distributed Storage</text>
  <text class="dim" x="56" y="460">-</text><text class="val" x="70" y="460">Kubernetes Operators</text>
  <text class="dim" x="56" y="480">-</text><text class="val" x="70" y="480">Volume Replication &amp; Disaster Recovery</text>

  <!-- Divider -->
  <line class="divider" x1="24" y1="500" x2="776" y2="500"/>

  <!-- Prompt 2: ceph status -->
  <text class="prompt-arrow" x="24" y="525">❯</text>
  <text class="prompt-path" x="40" y="525">~/ceph</text>
  <text class="prompt-cmd" x="100" y="525">ceph status --developer</text>

  <text class="header" x="40" y="550">cluster:</text>
  <text class="key" x="56" y="570">id:</text>
  <text class="dim" x="105" y="570">github.com/</text>
  <text class="val" x="210" y="570">Rakshith-R</text>
  <text class="key" x="56" y="590">health:</text>
  <text class="ok" x="130" y="590">HEALTH_OK</text>

  <!-- Blinking cursor at bottom -->
  <text class="prompt-arrow" x="24" y="615">❯</text>
  <text class="prompt-path" x="40" y="615">~/ceph</text>
  <rect class="cursor" x="100" y="603" width="8" height="16" rx="1"/>
</svg>
